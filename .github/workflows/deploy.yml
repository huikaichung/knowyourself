name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: selfkitart
  REGION: asia-northeast1
  AR_REPO: knowyourself
  IMAGE_NAME: web
  WIF_PROVIDER: projects/129518505568/locations/global/workloadIdentityPools/github-pool/providers/github
  DEPLOYER_SA: github-deployer-ky@selfkitart.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.4

      - name: Terraform plan
        working-directory: infra
        run: |
          terraform init
          terraform plan -var "image_tag=${{ github.sha }}" -no-color

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.4

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve -var "image_tag=${{ github.sha }}"

      - name: Deploy new revision
        run: |
          gcloud run services update knowyourself \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --image="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Smoke test
        run: |
          sleep 10
          curl -fsS https://knowyourself.selfkit.art/ -o /dev/null || exit 1
